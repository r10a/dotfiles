# ~/.config/tmux/tmux.conf
# tmux configuration — mirrors the nvim setup (arrow-key nav, h/v splits, true color)

# ── Prefix ──────────────────────────────────────────────────────────
# Space is nvim's leader; use C-a for tmux to avoid clobbering it.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color (matches termguicolors)
set -g mouse on                              # mouse = "a"
set -g history-limit 50000
set -sg escape-time 10                       # snappy, like a low timeoutlen
set -g focus-events on
set -g renumber-windows on                   # keep window numbers gapless
set -g base-index 1                          # 1-based, like bufferline ordinals
setw -g pane-base-index 1
set -g set-clipboard on                      # integrate with system clipboard

# ── Reload (prefix r), echoes nvim's <leader>r ──────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# ── Splits (prefix h / v), echoes nvim's <leader>h / <leader>v ──────
# Open new splits in the current pane's directory.
unbind '"'
unbind %
bind h split-window -v -c "#{pane_current_path}"   # horizontal split (stacked)
bind v split-window -h -c "#{pane_current_path}"    # vertical split (side by side)
bind c new-window -c "#{pane_current_path}"

# Kill pane / window without the y/n confirmation prompt.
bind x kill-pane
bind & kill-window

# ── Pane navigation (prefix + arrows), echoes nvim's <leader><arrows> ─
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# Repeatable pane resizing with Shift+arrows.
bind -r S-Left  resize-pane -L 5
bind -r S-Down  resize-pane -D 5
bind -r S-Up    resize-pane -U 5
bind -r S-Right resize-pane -R 5

# ── Copy mode (vi keys, matches an nvim muscle memory) ──────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Statusline (clean, subtle — no colorscheme plugin assumed) ──────
set -g status-position bottom
set -g status-justify left
set -g status-interval 5
set -g status-style "fg=white,bg=default"

set -g status-left "#[bold] #S "
set -g status-left-length 30

set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=white]%H:%M "
set -g status-right-length 40

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bold,reverse] #I:#W "

# Subtle, non-intrusive pane borders.
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=cyan"

# Message styling.
set -g message-style "fg=cyan,bg=default"
